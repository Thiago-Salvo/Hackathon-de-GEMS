<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Red Panda Invaders</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      user-select: none;
    }
    canvas {
      display: block;
      background: #000;
      box-shadow: 0 0 20px rgba(0,255,255,0.2);
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="480" height="620"></canvas>
  <script>
    // === 1. NOVA MECÂNICA ===
    /* NOVA MECÂNICA: MODO HYPE — Acumule 12 kills sem levar dano para disparar um feixe vertical destrutivo com a tecla SHIFT. */

    // === 2. CONFIG ===
    const CONFIG = {
      WIDTH: 480, HEIGHT: 620,
      PLAYER_Y: 530, PLAYER_SPEED: 250,
      FIRE_COOLDOWN: 0.32,
      HYPE_MAX: 12, HYPE_DURATION: 2.5, HYPE_COOLDOWN: 4.0
    };

    // === 3. STATE ===
    const STATE = {
      screen: 'MENU', // MENU, PLAYING, PHASE_CLEAR, GAME_OVER, VICTORY
      phase: 1, score: 0,
      highScore: localStorage.getItem('rpi_highscore') || 0,
      lives: 3, hype: 0, isHype: false, hypeTimer: 0, hypeCooldownTimer: 0,
      stateTimer: 0, keys: {}, mousePressed: false
    };

    // === 4. AUDIO ===
    let audioCtx = null;
    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    function playSound(type) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      let t = audioCtx.currentTime;
      
      if (type === 'shoot') {
        osc.type = 'square'; osc.frequency.setValueAtTime(600, t); osc.frequency.exponentialRampToValueAtTime(300, t+0.1);
        gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.01, t+0.1);
        osc.start(t); osc.stop(t+0.1);
      } else if (type === 'hit') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, t); osc.frequency.exponentialRampToValueAtTime(50, t+0.2);
        gain.gain.setValueAtTime(0.2, t); gain.gain.exponentialRampToValueAtTime(0.01, t+0.2);
        osc.start(t); osc.stop(t+0.2);
      } else if (type === 'enemyDie') {
        osc.type = 'square'; osc.frequency.setValueAtTime(200, t); osc.frequency.exponentialRampToValueAtTime(100, t+0.15);
        gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.01, t+0.15);
        osc.start(t); osc.stop(t+0.15);
      } else if (type === 'powerup') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(400, t); osc.frequency.linearRampToValueAtTime(800, t+0.2);
        gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0.01, t+0.2);
        osc.start(t); osc.stop(t+0.2);
      } else if (type === 'hype') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, t); osc.frequency.linearRampToValueAtTime(1200, t+0.5);
        gain.gain.setValueAtTime(0.2, t); gain.gain.linearRampToValueAtTime(0.01, t+2.5);
        osc.start(t); osc.stop(t+2.5);
      }
    }

    // === 5. ASSETS / CLASSES ===
    class Particle {
      constructor(x, y, color) {
        this.x = x; this.y = y;
        this.vx = (Math.random()-0.5)*150; this.vy = (Math.random()-0.5)*150;
        this.life = 1.0; this.color = color;
      }
      update(dt) { this.x+=this.vx*dt; this.y+=this.vy*dt; this.life-=dt*1.5; }
      draw(ctx) {
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, 4, 4);
        ctx.globalAlpha = 1;
      }
    }

    class TextFloat {
      constructor(x, y, txt, color) {
        this.x = x; this.y = y; this.txt = txt; this.color = color; this.life = 1.0;
      }
      update(dt) { this.y-=50*dt; this.life-=dt*1.5; }
      draw(ctx) {
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = this.color; ctx.font = "12px Courier";
        ctx.fillText(this.txt, this.x - 10, this.y);
        ctx.globalAlpha = 1;
      }
    }

    class Player {
      constructor() {
        this.x = CONFIG.WIDTH/2; this.y = CONFIG.PLAYER_Y; this.w = 24; this.h = 24;
        this.cd = 0; this.invul = 0; this.giantTimer = 0; this.cloneActive = false;
        this.bigBamboo = 0; this.ninjaStars = 0; this.shield = 0; this.parrots = 0;
      }
      update(dt) {
        if (!STATE.isHype) {
          if ((STATE.keys['ArrowLeft'] || STATE.keys['KeyA']) && this.x > 12) this.x -= CONFIG.PLAYER_SPEED * dt;
          if ((STATE.keys['ArrowRight'] || STATE.keys['KeyD']) && this.x < CONFIG.WIDTH-12) this.x += CONFIG.PLAYER_SPEED * dt;
        }
        if (this.cd > 0) this.cd -= dt;
        if (this.invul > 0) this.invul -= dt;
        if (this.giantTimer > 0) this.giantTimer -= dt;

        if (!STATE.isHype && (STATE.keys['Space'] || STATE.mousePressed) && this.cd <= 0) {
          this.shoot();
        }
      }
      shoot() {
        let maxBullets = this.giantTimer > 0 ? 3 : 1;
        let pBullets = bullets.filter(b => b.isPlayer);
        if (pBullets.length >= maxBullets && this.ninjaStars <= 0) return;

        playSound('shoot');
        let power = this.giantTimer > 0 ? 2 : 1;
        let w = this.giantTimer > 0 ? 6 : 4;
        let isPierce = this.bigBamboo > 0;
        
        if (this.ninjaStars > 0) {
          bullets.push(new Bullet(this.x, this.y-10, -1, power, w, isPierce, -50));
          bullets.push(new Bullet(this.x, this.y-10, -1, power, w, isPierce, 0));
          bullets.push(new Bullet(this.x, this.y-10, -1, power, w, isPierce, 50));
          this.ninjaStars--;
        } else {
          bullets.push(new Bullet(this.x, this.y-10, -1, power, w, isPierce, 0));
          if (this.bigBamboo > 0) this.bigBamboo--;
        }
        
        if (this.cloneActive) {
          bullets.push(new Bullet(this.x - 40, this.y-10, -1, power, w, isPierce, 0));
        }

        this.cd = this.giantTimer > 0 ? 0.18 : CONFIG.FIRE_COOLDOWN;
      }
      hit() {
        if (this.invul > 0 || STATE.isHype) return;
        if (this.shield > 0) { this.shield = 0; return; }
        if (this.parrots > 0) { this.parrots--; return; }
        
        STATE.lives--;
        STATE.hype = 0;
        this.invul = 2.0;
        shake = 12; flash = '#ff0000'; flashAlpha = 0.5;
        playSound('hit');
        if (STATE.lives <= 0) {
          STATE.screen = 'GAME_OVER';
          STATE.stateTimer = 1.5;
          saveHighScore();
        }
      }
      draw(ctx) {
        if (this.invul > 0 && Math.floor(Date.now()/100)%2===0) return; // blink
        ctx.save();
        ctx.translate(this.x, this.y);
        let s = this.giantTimer > 0 ? 1.8 : 1;
        ctx.scale(s, s);
        if (this.giantTimer > 0) {
            ctx.shadowColor = 'red'; ctx.shadowBlur = 10;
        }

        // Cauda
        ctx.fillStyle = '#AA2200';
        let tailX = Math.sin(Date.now()*0.005)*10;
        ctx.fillRect(-6+tailX, 10, 12, 18);
        ctx.fillStyle = '#111';
        ctx.fillRect(-6+tailX, 14, 12, 4);

        // Corpo e cabeça
        ctx.fillStyle = '#AA2200';
        ctx.beginPath(); ctx.arc(0,0, 12, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(0,-6, 14, 0, Math.PI*2); ctx.fill();
        
        // Focinho
        ctx.fillStyle = '#F5DEB3';
        ctx.beginPath(); ctx.arc(0,-4, 8, 0, Math.PI*2); ctx.fill();

        // Orelhas
        ctx.fillStyle = '#AA2200';
        ctx.beginPath(); ctx.moveTo(-10,-14); ctx.lineTo(-16,-20); ctx.lineTo(-4,-18); ctx.fill();
        ctx.beginPath(); ctx.moveTo(10,-14); ctx.lineTo(16,-20); ctx.lineTo(4,-18); ctx.fill();

        // Olhos
        ctx.fillStyle = '#111';
        if (this.invul > 0 && STATE.lives > 0) {
           ctx.fillRect(-8,-10, 4, 2); ctx.fillRect(4,-10, 4, 2);
        } else {
           ctx.beginPath(); ctx.arc(-6,-10, 3, 0, Math.PI*2); ctx.fill();
           ctx.beginPath(); ctx.arc(6,-10, 3, 0, Math.PI*2); ctx.fill();
           ctx.fillStyle = '#FFF';
           ctx.fillRect(-7,-11, 2, 2); ctx.fillRect(5,-11, 2, 2);
        }

        // Braços c/ Bambu
        ctx.fillStyle = '#AA2200';
        ctx.fillRect(-14, 0, 6, 8); ctx.fillRect(8, 0, 6, 8);
        ctx.fillStyle = '#228B22';
        ctx.fillRect(-18, 4, 36, 4);
        
        if (this.shield > 0) {
            ctx.strokeStyle = '#00FFFF'; ctx.lineWidth=2;
            ctx.beginPath(); ctx.arc(0,0, 20, Math.PI, 0); ctx.stroke();
        }

        ctx.restore();

        // Clone
        if (this.cloneActive) {
          ctx.save();
          ctx.translate(this.x - 40, this.y);
          ctx.globalAlpha = 0.5;
          ctx.fillStyle = '#AA2200'; ctx.beginPath(); ctx.arc(0,0, 12, 0, Math.PI*2); ctx.fill();
          ctx.restore();
        }

        // Hype Beam
        if (STATE.isHype) {
            ctx.fillStyle = '#FFFFDD';
            ctx.fillRect(this.x - 20, 0, 40, this.y);
            ctx.fillStyle = '#FFAA00';
            ctx.globalAlpha = 0.5 + Math.sin(Date.now()*0.02)*0.2;
            ctx.fillRect(this.x - 25, 0, 50, this.y);
            ctx.globalAlpha = 1;
        }
      }
    }

    class Bullet {
      constructor(x, y, dir, power=1, w=4, pierce=false, vx=0) {
        this.x = x; this.y = y; this.w = w; this.h = 12; this.dir = dir;
        this.vy = dir * 400; this.vx = vx;
        this.isPlayer = dir < 0; this.power = power; this.pierce = pierce;
      }
      update(dt) { this.y += this.vy * dt; this.x += this.vx * dt; }
      draw(ctx) {
        ctx.fillStyle = this.isPlayer ? '#228B22' : (STATE.phase === 3 ? '#AA00FF' : '#00FFFF');
        ctx.fillRect(this.x - this.w/2, this.y, this.w, this.h);
      }
    }

    class Boss {
      constructor() {
        this.active = true; this.maxHp = 60; this.hp = 60;
        this.x = CONFIG.WIDTH/2; this.y = 80; this.w = 160; this.h = 80;
        this.timer = 0; this.vx = 80; this.gems = [];
      }
      update(dt) {
        this.timer += dt;
        this.x += this.vx * dt;
        if (this.x < 90 || this.x > CONFIG.WIDTH-90) this.vx *= -1;

        let lim = this.hp > 40 ? 6 : (this.hp > 20 ? 8 : 10);
        let rate = this.hp > 40 ? 1.2 : (this.hp > 20 ? 1.0 : 0.8);
        
        if (this.timer > rate) {
            this.timer = 0;
            let eb = bullets.filter(b => !b.isPlayer).length;
            if (eb < lim) {
                if (this.hp > 40) {
                    for(let i=0; i<5; i++) bullets.push(new Bullet(this.x - 60 + Math.random()*120, this.y+40, 1, 1, 6));
                } else {
                    bullets.push(new Bullet(this.x, this.y+40, 1, 1, 6, false, -50));
                    bullets.push(new Bullet(this.x, this.y+40, 1, 1, 6, false, 0));
                    bullets.push(new Bullet(this.x, this.y+40, 1, 1, 6, false, 50));
                }
            }
        }
        
        if (this.hp === 45 && !this.gems.includes(1)) this.spawnGem(1, '#FF2200');
        if (this.hp === 30 && !this.gems.includes(2)) this.spawnGem(2, '#00FF44');
        if (this.hp === 15 && !this.gems.includes(3)) this.spawnGem(3, '#2244FF');
      }
      spawnGem(id, color) {
          this.gems.push(id);
          powerups.push({ x: 50 + Math.random()*(CONFIG.WIDTH-100), y: 300, type: 'GEM', color: color, id: id, timer: 7, vy:0 });
      }
      hit(dmg) {
          this.hp -= dmg;
          if (this.hp <= 0) {
             this.active = false;
             STATE.score += 1000;
             shake = 20;
             playSound('enemyDie');
             for(let i=0;i<30;i++) particles.push(new Particle(this.x, this.y, '#00FFFF'));
          }
      }
      draw(ctx) {
        if (!this.active) return;
        ctx.save();
        ctx.translate(this.x, this.y);
        let s = 1 + Math.sin(Date.now()*0.005)*0.02;
        ctx.scale(s,s);
        
        ctx.fillStyle = this.hp < 30 ? '#330055' : '#0033AA';
        ctx.shadowColor = '#00FFFF'; ctx.shadowBlur = 10;
        ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
        
        ctx.fillStyle = '#00FFFF';
        if(this.hp < 15 && Math.floor(Date.now()/100)%2===0) ctx.fillStyle = '#FF0000';
        ctx.beginPath(); ctx.moveTo(-40, -10); ctx.lineTo(-20,-20); ctx.lineTo(-20,0); ctx.fill();
        ctx.beginPath(); ctx.moveTo(40, -10); ctx.lineTo(20,-20); ctx.lineTo(20,0); ctx.fill();

        ctx.fillStyle = '#001133';
        ctx.fillRect(-30, 10, 60, 20);
        
        ctx.restore();
      }
    }

    // === GLOBAL OBJECTS ===
    let player, boss;
    let enemies = [];
    let bullets = [];
    let particles = [];
    let floatTexts = [];
    let powerups = [];
    let barriers = [];
    let grid = { x: 0, y: -200, vx: 30, vy: 0, timer: 0, fireRate: 1.6, entering: true };
    let shake = 0, flashAlpha = 0, flash = '#FFF';

    const ENEMY_TYPES = {
        1: { hp: 1, pts: 10, w: 24, h: 24, color: '#8B4513' }, // Cadeira
        2: { hp: 1, pts: 20, w: 28, h: 24, color: '#A0522D' }, // Mesa
        3: { hp: 1, pts: 15, w: 24, h: 24, color: '#A9A9A9' }, // Pombo
        4: { hp: 1, pts: 25, w: 24, h: 24, color: '#2F4F4F' }, // Rato
        5: { hp: 1, pts: 20, w: 28, h: 28, color: '#111' },    // Panda Maligno
        6: { hp: 2, pts: 35, w: 28, h: 28, color: '#228B22' }  // Panda Armadura
    };

    const POWERUP_DEFS = [
        { id:'BAMBU', color:'#FFD700', text:'BAMBU GRANDE!' },
        { id:'NINJA', color:'#C0C0C0', text:'ESTRELAS NINJA!' },
        { id:'CLONE', color:'#F5F5DC', text:'CLONE!' },
        { id:'SHIELD', color:'#00FFFF', text:'ESCUDO!' },
        { id:'PARROT', color:'#32CD32', text:'PAPAGAIO!' }
    ];

    // === 7. SYSTEMS ===
    function initPhase(n) {
      STATE.phase = n;
      bullets = []; particles = []; floatTexts = []; powerups = [];
      enemies = []; barriers = []; boss = null;
      player.x = CONFIG.WIDTH/2;
      
      // Barriers
      let bColors = ['#8B4513', '#8B4513', '#228B22', '#00FFFF'];
      for(let i=0; i<4; i++) {
        let bx = 60 + i*100;
        for(let r=0; r<3; r++) {
            for(let c=0; c<4; c++) {
                barriers.push({ x: bx + c*12, y: 440 + r*12, w:12, h:12, hp:2, color: bColors[n-1] });
            }
        }
      }

      grid.entering = true;
      grid.x = 40; grid.y = -200;
      
      let cols = 9, rows = 3, types = [], vBase = 30;
      if (n === 1) { rows = 3; types = [1,1,2]; grid.fireRate = 1.6; vBase = 30; }
      else if (n === 2) { rows = 4; types = [3,3,4,4]; grid.fireRate = 1.2; vBase = 45; }
      else if (n === 3) { cols = 10; rows = 4; types = [5,5,6,6]; grid.fireRate = 0.9; vBase = 60; }
      else if (n === 4) { boss = new Boss(); grid.entering = false; return; }

      grid.vx = vBase;
      let cellW = 40, cellH = 35;
      for(let r=0; r<rows; r++) {
          for(let c=0; c<cols; c++) {
              enemies.push({ c: c, r: r, x:0, y:0, type: types[r], hp: ENEMY_TYPES[types[r]].hp, offset: c*0.5 });
          }
      }
    }

    function checkCollisions() {
        // Player Bullets
        for(let i=bullets.length-1; i>=0; i--) {
            let b = bullets[i];
            if (!b.isPlayer) {
                // Enemy bullet vs Player
                if (b.x > player.x-12 && b.x < player.x+12 && b.y > player.y-12 && b.y < player.y+12) {
                    player.hit();
                    bullets.splice(i, 1);
                }
                continue;
            }

            let hit = false;
            // Vs Boss
            if (boss && boss.active && b.y < boss.y+boss.h/2 && b.y > boss.y-boss.h/2 && b.x > boss.x-boss.w/2 && b.x < boss.x+boss.w/2) {
                boss.hit(b.power);
                hit = true;
                for(let k=0;k<5;k++) particles.push(new Particle(b.x, b.y, '#00FFFF'));
            }

            // Vs Enemies
            if (!hit && enemies.length > 0) {
                for(let j=enemies.length-1; j>=0; j--) {
                    let e = enemies[j];
                    let def = ENEMY_TYPES[e.type];
                    let ex = grid.x + e.c*40, ey = grid.y + e.r*35;
                    if (b.x > ex-def.w/2 && b.x < ex+def.w/2 && b.y > ey-def.h/2 && b.y < ey+def.h/2) {
                        e.hp -= b.power;
                        if (e.hp <= 0) {
                            STATE.score += def.pts;
                            STATE.hype = Math.min(CONFIG.HYPE_MAX, STATE.hype + 1);
                            floatTexts.push(new TextFloat(ex, ey, `+${def.pts}`, '#FFF'));
                            for(let k=0;k<8;k++) particles.push(new Particle(ex, ey, def.color));
                            playSound('enemyDie');
                            
                            // Powerup Drop
                            let dropChance = STATE.phase === 3 ? 0.35 : 0.28;
                            if (Math.random() < dropChance) {
                                let pDef = POWERUP_DEFS[Math.floor(Math.random()*POWERUP_DEFS.length)];
                                powerups.push({ x: ex, y: ey, vy: 100, type: pDef.id, color: pDef.color, txt: pDef.text });
                            }
                            enemies.splice(j, 1);
                        }
                        hit = true;
                        break;
                    }
                }
            }

            // Vs Barriers
            if (!hit) {
               for(let j=barriers.length-1; j>=0; j--) {
                   let br = barriers[j];
                   if (b.x > br.x && b.x < br.x+br.w && b.y > br.y && b.y < br.y+br.h) {
                       br.hp--;
                       if(br.hp <= 0) barriers.splice(j,1);
                       hit = true; break;
                   }
               }
            }

            if (hit && !b.pierce) bullets.splice(i, 1);
        }

        // Enemy bullets vs Barriers
        for(let i=bullets.length-1; i>=0; i--) {
            let b = bullets[i];
            if (b.isPlayer) continue;
            for(let j=barriers.length-1; j>=0; j--) {
                let br = barriers[j];
                if (b.x > br.x && b.x < br.x+br.w && b.y > br.y && b.y < br.y+br.h) {
                    br.hp--;
                    if(br.hp <= 0) barriers.splice(j,1);
                    bullets.splice(i, 1);
                    break;
                }
            }
        }

        // Powerups vs Player
        for(let i=powerups.length-1; i>=0; i--) {
            let p = powerups[i];
            if (p.x > player.x-15 && p.x < player.x+15 && p.y > player.y-15 && p.y < player.y+15) {
                playSound('powerup');
                if (p.type === 'GEM') {
                   player.gems = (player.gems||0)+1;
                   if(player.gems >= 3) { player.giantTimer = 999; floatTexts.push(new TextFloat(player.x, player.y-20, "PANDA GIGANTE!", '#FFF')); }
                } else {
                   floatTexts.push(new TextFloat(player.x, player.y-20, p.txt, p.color));
                   if (p.type==='BAMBU') player.bigBamboo = 5;
                   if (p.type==='NINJA') player.ninjaStars = 4;
                   if (p.type==='CLONE') player.cloneActive = true;
                   if (p.type==='SHIELD') player.shield = 1;
                   if (p.type==='PARROT') player.parrots = 3;
                }
                powerups.splice(i, 1);
            }
        }
    }

    function saveHighScore() {
        if (STATE.score > STATE.highScore) {
            STATE.highScore = STATE.score;
            localStorage.setItem('rpi_highscore', STATE.highScore);
        }
    }

    // === 8. GAME LOOP & UPDATE ===
    let lastTime = 0;
    function update(dt) {
      if (STATE.screen !== 'PLAYING' && STATE.screen !== 'PHASE_CLEAR') {
          if (STATE.stateTimer > 0) STATE.stateTimer -= dt;
          return;
      }

      if (shake > 0) shake -= 60 * dt;
      if (flashAlpha > 0) flashAlpha -= 2 * dt;

      player.update(dt);
      
      // Hype Beam Logic
      if (STATE.isHype) {
          STATE.hypeTimer -= dt;
          if (STATE.hypeTimer <= 0) {
              STATE.isHype = false; STATE.hype = 0; STATE.hypeCooldownTimer = CONFIG.HYPE_COOLDOWN;
          } else {
              // Destroy in beam
              for(let j=enemies.length-1; j>=0; j--) {
                  let ex = grid.x + enemies[j].c*40;
                  if (ex > player.x-25 && ex < player.x+25) enemies.splice(j,1);
              }
              for(let j=bullets.length-1; j>=0; j--) {
                  if (bullets[j].x > player.x-25 && bullets[j].x < player.x+25) bullets.splice(j,1);
              }
          }
      }
      if (STATE.hypeCooldownTimer > 0) STATE.hypeCooldownTimer -= dt;
      if (!STATE.isHype && STATE.keys['Shift'] && STATE.hype >= CONFIG.HYPE_MAX && STATE.hypeCooldownTimer <= 0) {
          STATE.isHype = true; STATE.hypeTimer = CONFIG.HYPE_DURATION; playSound('hype'); flash = '#FFAA00'; flashAlpha = 0.5;
      }

      bullets.forEach(b => b.update(dt));
      particles.forEach(p => p.update(dt));
      floatTexts.forEach(f => f.update(dt));
      powerups.forEach(p => { p.y += p.vy*dt; if (p.timer) p.timer -= dt; });
      
      bullets = bullets.filter(b => b.y > 0 && b.y < CONFIG.HEIGHT);
      particles = particles.filter(p => p.life > 0);
      floatTexts = floatTexts.filter(f => f.life > 0);
      powerups = powerups.filter(p => p.y < CONFIG.HEIGHT && (p.timer===undefined || p.timer>0));

      if (STATE.screen === 'PLAYING') {
          if (boss) {
              boss.update(dt);
              if (!boss.active) {
                  STATE.screen = 'VICTORY'; STATE.stateTimer = 2.0; saveHighScore();
              }
          } else {
              // Grid Logic
              if (grid.entering) {
                  grid.y += 100 * dt;
                  if (grid.y >= 80) grid.entering = false;
              } else if (enemies.length > 0 && !STATE.isHype) {
                  let minC = 99, maxC = -1, maxY = 0;
                  enemies.forEach(e => { if(e.c < minC) minC=e.c; if(e.c > maxC) maxC=e.c; let ey=grid.y+e.r*35; if(ey>maxY) maxY=ey; });
                  
                  let velMult = 1 + (1 - enemies.length / (STATE.phase===3?40:36)) * 1.5;
                  let nx = grid.x + grid.vx * velMult * dt;
                  let leftEdge = nx + minC*40 - 15, rightEdge = nx + maxC*40 + 15;
                  
                  if (rightEdge > CONFIG.WIDTH - 8 || leftEdge < 8) {
                      grid.vx *= -1;
                      grid.y += 18;
                  } else {
                      grid.x = nx;
                  }

                  if (maxY > player.y - 20) {
                      STATE.screen = 'GAME_OVER'; STATE.stateTimer = 1.5; saveHighScore();
                  }

                  // Enemy Fire
                  grid.timer += dt;
                  if (grid.timer > grid.fireRate) {
                      grid.timer = 0;
                      let eb = bullets.filter(b => !b.isPlayer).length;
                      let lim = STATE.phase === 3 ? 6 : 4;
                      if (eb < lim) {
                          let colsWithEnemies = [...new Set(enemies.map(e=>e.c))];
                          let rndCol = colsWithEnemies[Math.floor(Math.random()*colsWithEnemies.length)];
                          let colEnemies = enemies.filter(e=>e.c === rndCol);
                          let shooter = colEnemies.reduce((prev, curr) => (prev.r > curr.r) ? prev : curr);
                          bullets.push(new Bullet(grid.x + shooter.c*40, grid.y + shooter.r*35 + 10, 1, 1, 4));
                      }
                  }
              }

              if (enemies.length === 0 && !boss) {
                  STATE.screen = 'PHASE_CLEAR'; STATE.stateTimer = 2.5;
              }
          }
      }

      if (STATE.screen === 'PHASE_CLEAR') {
          STATE.stateTimer -= dt;
          if (STATE.stateTimer <= 0) {
              if (STATE.phase < 4) { initPhase(STATE.phase + 1); STATE.screen = 'PLAYING'; }
              else { STATE.screen = 'VICTORY'; STATE.stateTimer = 2.0; saveHighScore(); }
          }
      }

      checkCollisions();
    }

    // === RENDER ===
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function drawHUD() {
      ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0,0,CONFIG.WIDTH, 30);
      ctx.fillStyle = '#FFF'; ctx.font = '14px Courier bold';
      ctx.fillText(`SCORE: ${STATE.score.toString().padStart(5,'0')}`, 10, 20);
      ctx.fillText(`BEST: ${STATE.highScore.toString().padStart(5,'0')}`, 130, 20);
      ctx.fillText(`FASE ${STATE.phase}/4`, 280, 20);
      
      let livesStr = ''; for(let i=0;i<STATE.lives;i++) livesStr += '♥ ';
      ctx.fillStyle = '#FF2200'; ctx.fillText(livesStr, 400, 20);

      // Hype Bar
      let hy = 35;
      for(let i=0; i<CONFIG.HYPE_MAX; i++) {
          ctx.fillStyle = i < STATE.hype ? '#FFAA00' : '#333';
          if (STATE.hypeCooldownTimer > 0) ctx.fillStyle = '#555';
          ctx.fillRect(10 + i*(CONFIG.WIDTH-20)/CONFIG.HYPE_MAX, hy, ((CONFIG.WIDTH-20)/CONFIG.HYPE_MAX)-2, 8);
      }
      if (STATE.hype >= CONFIG.HYPE_MAX && Math.floor(Date.now()/200)%2===0 && STATE.hypeCooldownTimer<=0) {
          ctx.fillStyle = '#FFF'; ctx.fillText("SHIFT!", 200, 55);
      }
      if (STATE.hypeCooldownTimer > 0) {
          ctx.fillStyle = '#888'; ctx.fillText("AGUARDE...", 200, 55);
      }

      // Boss HP
      if (boss && boss.active) {
          ctx.fillStyle = '#333'; ctx.fillRect(40, 65, 400, 15);
          let ratio = boss.hp / boss.maxHp;
          ctx.fillStyle = ratio < 0.3 ? '#FF0000' : '#0044FF';
          ctx.fillRect(42, 67, 396*ratio, 11);
          ctx.fillStyle = '#FFF'; ctx.fillText("SINTETIZADO", 180, 77);
      }
    }

    function drawEnemy(e) {
        let def = ENEMY_TYPES[e.type];
        let ex = grid.x + e.c*40;
        let ey = grid.y + e.r*35;
        let t = Date.now()*0.005 + e.offset;
        
        ctx.save(); ctx.translate(ex, ey);
        
        // Idle animation
        if (e.type !== 5) ctx.translate(Math.sin(t)*2, Math.cos(t)*2);
        else ctx.translate((Math.random()-0.5)*3, (Math.random()-0.5)*3); // Vibração panda maligno

        // Bug effect (fase 1)
        if (STATE.phase === 1 && Math.random() < 0.02) { ctx.translate((Math.random()-0.5)*6, 0); ctx.fillStyle = 'rgba(255,0,0,0.5)'; ctx.fillRect(-def.w/2,-def.h/2,def.w,def.h); }

        ctx.fillStyle = def.color;
        ctx.fillRect(-def.w/2, -def.h/2, def.w, def.h);
        
        // Detalhes visuais simplificados
        ctx.fillStyle = (e.type === 5 || e.type === 6) ? '#F00' : '#000'; // Olhos vermelhos pros pandas malignos
        ctx.fillRect(-6, -6, 4, 4); ctx.fillRect(2, -6, 4, 4);

        if (e.type === 6) { // Armadura
            ctx.fillStyle = '#228B22';
            ctx.fillRect(-def.w/2-2, -2, def.w+4, 6);
            if (e.hp < 2) { ctx.fillStyle = '#111'; ctx.fillRect(-def.w/2,-def.h/2,def.w,def.h); } // Armadura quebrada
        }
        ctx.restore();
    }

    function render() {
      // Fundo dependendo da fase
      if (STATE.phase === 1) ctx.fillStyle = '#F5F5DC'; // Creme
      else if (STATE.phase === 2) {
          let grd = ctx.createLinearGradient(0,0,0,CONFIG.HEIGHT);
          grd.addColorStop(0, '#87CEEB'); grd.addColorStop(1, '#228B22');
          ctx.fillStyle = grd;
      }
      else if (STATE.phase === 3) ctx.fillStyle = '#051505'; // Bambuzal
      else ctx.fillStyle = '#000011'; // Boss
      
      ctx.fillRect(0,0, CONFIG.WIDTH, CONFIG.HEIGHT);

      ctx.save();
      if (shake > 0) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);

      if (STATE.screen === 'PLAYING' || STATE.screen === 'PHASE_CLEAR') {
          barriers.forEach(b => {
              ctx.fillStyle = b.color; ctx.fillRect(b.x, b.y, b.w, b.h);
              ctx.strokeStyle = '#000'; ctx.strokeRect(b.x, b.y, b.w, b.h);
          });
          powerups.forEach(p => {
              ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, Math.PI*2); ctx.fill();
              if (p.timer && p.timer < 2 && Math.floor(Date.now()/100)%2===0) { ctx.fillStyle='#FFF'; ctx.fill(); }
          });
          bullets.forEach(b => b.draw(ctx));
          particles.forEach(p => p.draw(ctx));
          enemies.forEach(e => drawEnemy(e));
          if (boss) boss.draw(ctx);
          player.draw(ctx);
          floatTexts.forEach(f => f.draw(ctx));
      }
      ctx.restore();

      if (STATE.screen === 'PLAYING' || STATE.screen === 'PHASE_CLEAR') drawHUD();

      // UI Overlays
      if (flashAlpha > 0) {
          ctx.fillStyle = flash; ctx.globalAlpha = flashAlpha;
          ctx.fillRect(0,0,CONFIG.WIDTH, CONFIG.HEIGHT); ctx.globalAlpha = 1;
      }

      ctx.fillStyle = '#FFF'; ctx.textAlign = 'center';
      if (STATE.screen === 'MENU') {
          ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,CONFIG.WIDTH,CONFIG.HEIGHT);
          ctx.font = '30px Courier bold'; ctx.fillStyle = '#FF2200';
          ctx.fillText("RED PANDA INVADERS", CONFIG.WIDTH/2, 200);
          ctx.font = '16px Courier'; ctx.fillStyle = '#FFD700';
          ctx.fillText(`HIGH SCORE: ${STATE.highScore}`, CONFIG.WIDTH/2, 250);
          if (Math.floor(Date.now()/500)%2===0) {
              ctx.fillStyle = '#FFF'; ctx.fillText("ESPAÇO / CLIQUE para começar", CONFIG.WIDTH/2, 400);
          }
      }
      else if (STATE.screen === 'PHASE_CLEAR') {
          ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0,0,CONFIG.WIDTH,CONFIG.HEIGHT);
          ctx.font = '24px Courier bold'; ctx.fillStyle = '#00FF00';
          ctx.fillText(`FASE ${STATE.phase} CONCLUÍDA!`, CONFIG.WIDTH/2, 300);
      }
      else if (STATE.screen === 'GAME_OVER') {
          ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,CONFIG.WIDTH,CONFIG.HEIGHT);
          ctx.font = '40px Courier bold'; ctx.fillStyle = '#FF0000';
          ctx.fillText("GAME OVER", CONFIG.WIDTH/2, 250);
          ctx.font = '20px Courier'; ctx.fillStyle = '#FFF';
          ctx.fillText(`SCORE: ${STATE.score}`, CONFIG.WIDTH/2, 300);
          if (STATE.score >= STATE.highScore && STATE.score > 0) {
              ctx.fillStyle = '#FFD700'; ctx.fillText("NOVO RECORDE!", CONFIG.WIDTH/2, 340);
          }
          if (STATE.stateTimer <= 0 && Math.floor(Date.now()/500)%2===0) {
              ctx.fillStyle = '#FFF'; ctx.fillText("Pressione para recomeçar", CONFIG.WIDTH/2, 420);
          }
      }
      else if (STATE.screen === 'VICTORY') {
          ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0,0,CONFIG.WIDTH,CONFIG.HEIGHT);
          ctx.font = '40px Courier bold'; ctx.fillStyle = '#FFD700';
          ctx.fillText("VITÓRIA!", CONFIG.WIDTH/2, 250);
          ctx.font = '16px Courier'; ctx.fillStyle = '#FFF';
          ctx.fillText("O Sintetizado foi derrotado!", CONFIG.WIDTH/2, 290);
          ctx.fillStyle = '#00FFFF'; ctx.fillText(`SCORE FINAL: ${STATE.score}`, CONFIG.WIDTH/2, 330);
          if (STATE.stateTimer <= 0 && Math.floor(Date.now()/500)%2===0) {
              ctx.fillStyle = '#FFF'; ctx.fillText("Pressione para recomeçar", CONFIG.WIDTH/2, 420);
          }
      }
      ctx.textAlign = 'left';
    }

    function gameLoop(time) {
      requestAnimationFrame(gameLoop);
      let dt = (time - lastTime) / 1000;
      if (dt > 0.1) dt = 0.1; // Cap delta time
      lastTime = time;
      update(dt);
      render();
    }

    // === 9. INPUT & INIT ===
    window.addEventListener('keydown', e => {
      STATE.keys[e.code] = true;
      if (e.code === 'Space') e.preventDefault();
      handleAction();
    });
    window.addEventListener('keyup', e => { STATE.keys[e.code] = false; });
    canvas.addEventListener('mousedown', () => { STATE.mousePressed = true; handleAction(); });
    canvas.addEventListener('mouseup', () => { STATE.mousePressed = false; });
    canvas.addEventListener('touchstart', e => { e.preventDefault(); STATE.mousePressed = true; handleAction(); }, {passive: false});
    canvas.addEventListener('touchend', e => { e.preventDefault(); STATE.mousePressed = false; });
    
    // Suporte mobile basico: toca esquerda ou direita da tela
    canvas.addEventListener('touchmove', e => {
       e.preventDefault();
       let rect = canvas.getBoundingClientRect();
       let tx = e.touches[0].clientX - rect.left;
       if (tx < CONFIG.WIDTH/2) { STATE.keys['ArrowLeft'] = true; STATE.keys['ArrowRight'] = false; }
       else { STATE.keys['ArrowRight'] = true; STATE.keys['ArrowLeft'] = false; }
    }, {passive: false});

    function handleAction() {
        initAudio();
        if (STATE.screen === 'MENU') {
            STATE.score = 0; STATE.lives = 3; STATE.hype = 0;
            player = new Player();
            initPhase(1);
            STATE.screen = 'PLAYING';
        } else if ((STATE.screen === 'GAME_OVER' || STATE.screen === 'VICTORY') && STATE.stateTimer <= 0) {
            STATE.screen = 'MENU';
        }
    }

    // Inicialização
    player = new Player();
    requestAnimationFrame(gameLoop);
  </script>
</body>
