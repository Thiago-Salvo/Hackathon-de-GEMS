<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nemo Fuga Submarina</title>
    <style>
        /* ==========================================================================
           RESET E ESTILOS GERAIS
           ========================================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #001f3f;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ==========================================================================
           INTERFACE DE USUÁRIO (UI / HUD)
           ========================================================================== */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none; /* Deixa o canvas receber os cliques */
            z-index: 10;
        }

        .hud {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .powerup-status {
            font-size: 1.2rem;
            color: #ffd700;
            text-shadow: 1px 1px 2px #000;
            transition: opacity 0.3s;
        }

        /* Regra estrita de ocultação */
        .hidden {
            display: none !important;
        }

        .screen {
            background: rgba(0, 15, 30, 0.85);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 200, 255, 0.3), inset 0 0 20px rgba(0, 200, 255, 0.2);
            border: 2px solid #00aaff;
            pointer-events: auto; /* Permite interação apenas dentro das telas */
            backdrop-filter: blur(5px);
            animation: floatUI 3s ease-in-out infinite;
        }

        @keyframes floatUI {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 3.5rem;
            color: #ff7b00;
            text-shadow: 3px 3px 0 #fff, 0 0 20px #ff7b00;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 2.5rem;
            color: #ff4444;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0 #fff;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #aaddff;
        }

        /* Botões 3D */
        .btn {
            background: linear-gradient(to bottom, #ff9900, #cc5500);
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 15px 40px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 8px 0 #993300, 0 15px 20px rgba(0,0,0,0.4);
            transition: all 0.1s ease;
            text-transform: uppercase;
            pointer-events: auto;
        }

        .btn:hover {
            background: linear-gradient(to bottom, #ffaa33, #ee6600);
            transform: translateY(2px);
            box-shadow: 0 6px 0 #993300, 0 10px 15px rgba(0,0,0,0.4);
        }

        .btn:active {
            transform: translateY(8px);
            box-shadow: 0 0px 0 #993300, 0 5px 10px rgba(0,0,0,0.4);
        }

    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="hud" class="hud hidden">
            <div id="scoreDisplay">Pontos: 0</div>
            <div id="doubleScoreDisplay" class="powerup-status hidden">2X PONTOS! (10s)</div>
        </div>

        <div id="startScreen" class="ui-layer">
            <div class="screen">
                <h1>Fuga Submarina</h1>
                <p>Nade tocando na tela ou pressionando [ESPAÇO].<br>Desvie das redes, anzóis e tubarões!</p>
                <button id="startBtn" class="btn">Jogar</button>
            </div>
        </div>

        <div id="gameOverScreen" class="ui-layer hidden">
            <div class="screen">
                <h2>Você foi pego!</h2>
                <p id="finalScoreDisplay">Pontuação Final: 0</p>
                <button id="restartBtn" class="btn">Tentar Novamente</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * ============================================================================
         * CONFIGURAÇÕES GERAIS E ESTADO DO JOGO
         * ============================================================================
         */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const DEBUG = false; // Modo de visualização de Hitboxes

        let gameState = 'menu'; // 'menu', 'playing', 'gameover'
        let lastTime = 0;
        let animationId;
        let score = 0;
        
        // Elementos da UI
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const hud = document.getElementById('hud');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const finalScoreDisplay = document.getElementById('finalScoreDisplay');
        const doubleScoreDisplay = document.getElementById('doubleScoreDisplay');
        
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');

        // Efeitos globais
        let screenShakeTime = 0;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        /**
         * ============================================================================
         * CONTROLES E INPUT
         * ============================================================================
         */
        let isFlapping = false;

        function handleInput(e) {
            // Previne scroll do espaço
            if(e.type === 'keydown' && e.code === 'Space') e.preventDefault();
            
            if ((e.type === 'keydown' && e.code === 'Space') || e.type === 'mousedown' || e.type === 'touchstart') {
                // Se o clique foi em um botão, ignoramos a ação de jogo
                if (e.target.tagName === 'BUTTON') return;

                if (gameState === 'playing') {
                    player.flap();
                }
            }
        }

        window.addEventListener('keydown', handleInput);
        window.addEventListener('mousedown', handleInput);
        window.addEventListener('touchstart', handleInput, {passive: false});

        // Previne teclas travadas/ghost input
        window.addEventListener('blur', () => {
            isFlapping = false;
        });

        /**
         * ============================================================================
         * CLASSES DE ENTIDADES
         * ============================================================================
         */

        // 1. FUNDO PARALLAX
        class Background {
            constructor() {
                this.layers = [
                    { speed: 20, offset: 0, color: '#002244', drawFunc: this.drawDeepWater }, // Fundo distante
                    { speed: 60, offset: 0, color: '#004466', drawFunc: this.drawSeaweed },   // Meio termo
                    { speed: 120, offset: 0, color: '#c2b280', drawFunc: this.drawSand }       // Chão/Frente
                ];
            }
            update(dt) {
                this.layers.forEach(layer => {
                    layer.offset += layer.speed * dt;
                    if (layer.offset > canvas.width) layer.offset = 0;
                });
            }
            draw(ctx) {
                // Fundo gradiente base
                let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
                grad.addColorStop(0, "#001a33");
                grad.addColorStop(1, "#005588");
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                this.layers.forEach(layer => {
                    ctx.save();
                    ctx.translate(-layer.offset, 0);
                    layer.drawFunc(ctx, 0);
                    layer.drawFunc(ctx, canvas.width);
                    ctx.restore();
                });
            }
            drawDeepWater(ctx, xOffset) {
                ctx.fillStyle = 'rgba(0, 20, 50, 0.5)';
                ctx.beginPath();
                ctx.moveTo(xOffset, canvas.height);
                for(let i=0; i<=canvas.width; i+=100) {
                    ctx.lineTo(xOffset + i, canvas.height - 200 - Math.sin(i * 0.02) * 50);
                }
                ctx.lineTo(xOffset + canvas.width, canvas.height);
                ctx.fill();
            }
            drawSeaweed(ctx, xOffset) {
                ctx.strokeStyle = '#006633';
                ctx.lineWidth = 15;
                ctx.lineCap = 'round';
                for(let i=50; i<canvas.width; i+=150) {
                    ctx.beginPath();
                    ctx.moveTo(xOffset + i, canvas.height);
                    ctx.quadraticCurveTo(xOffset + i - 30, canvas.height - 100, xOffset + i + 10, canvas.height - 200);
                    ctx.stroke();
                }
            }
            drawSand(ctx, xOffset) {
                ctx.fillStyle = '#c2b280';
                ctx.beginPath();
                ctx.moveTo(xOffset, canvas.height);
                for(let i=0; i<=canvas.width; i+=50) {
                    ctx.lineTo(xOffset + i, canvas.height - 50 - Math.sin(i * 0.05) * 10);
                }
                ctx.lineTo(xOffset + canvas.width, canvas.height);
                ctx.fill();
            }
        }

        // 2. JOGADOR (NEMO)
        class Player {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = canvas.width * 0.2;
                this.y = canvas.height / 2;
                this.width = 60;
                this.height = 40;
                this.vy = 0;
                this.gravity = 1500;
                this.jumpStrength = -500;
                
                // Power-ups
                this.hasBubbleShield = false;
                this.doubleScoreTimer = 0;
            }
            flap() {
                this.vy = this.jumpStrength;
                spawnParticles(this.x, this.y, 5, '#ffffff', 2); // Bolhinhas ao nadar
            }
            update(dt) {
                this.vy += this.gravity * dt;
                this.y += this.vy * dt;

                // Limites da tela
                if (this.y - this.height/2 < 0) {
                    this.y = this.height/2;
                    this.vy = 0;
                }
                if (this.y + this.height/2 > canvas.height - 50) { // Chão
                    this.y = canvas.height - 50 - this.height/2;
                    triggerGameOver();
                }

                // Update Timers
                if (this.doubleScoreTimer > 0) {
                    this.doubleScoreTimer -= dt;
                    doubleScoreDisplay.classList.remove('hidden');
                    doubleScoreDisplay.innerText = `2X PONTOS! (${Math.ceil(this.doubleScoreTimer)}s)`;
                    if (this.doubleScoreTimer <= 0) {
                        doubleScoreDisplay.classList.add('hidden');
                    }
                }
            }
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Rotação suave baseada na velocidade Y
                let rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, (this.vy * 0.002)));
                ctx.rotate(rotation);

                // Escudo Bolha Aura
                if (this.hasBubbleShield) {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.width * 0.8, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0, 255, 255, 0.3)';
                    ctx.strokeStyle = 'rgba(0, 255, 255, 0.8)';
                    ctx.lineWidth = 3;
                    ctx.fill();
                    ctx.stroke();
                }

                // Corpo do peixe (Nemo)
                ctx.fillStyle = '#ff6600';
                ctx.beginPath();
                ctx.ellipse(0, 0, this.width/2, this.height/2, 0, 0, Math.PI * 2);
                ctx.fill();

                // Listras brancas com bordas pretas
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#000';
                ctx.fillStyle = '#fff';
                
                ctx.beginPath();
                ctx.fillRect(-this.width/6, -this.height/2 + 2, 10, this.height - 4);
                ctx.strokeRect(-this.width/6, -this.height/2 + 2, 10, this.height - 4);
                
                ctx.beginPath();
                ctx.fillRect(this.width/6, -this.height/2.5, 8, this.height*0.8);
                ctx.strokeRect(this.width/6, -this.height/2.5, 8, this.height*0.8);

                // Barbatana traseira
                ctx.fillStyle = '#ff6600';
                ctx.beginPath();
                ctx.moveTo(-this.width/2 + 5, 0);
                ctx.lineTo(-this.width/2 - 20, -15);
                ctx.lineTo(-this.width/2 - 15, 15);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

                // Olho
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(this.width/3, -5, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(this.width/3 + 2, -5, 3, 0, Math.PI * 2);
                ctx.fill();

                if (DEBUG) {
                    ctx.strokeStyle = 'red';
                    ctx.lineWidth = 2;
                    let hw = this.width * 0.4;
                    let hh = this.height * 0.4;
                    ctx.strokeRect(-hw, -hh, hw*2, hh*2);
                }

                ctx.restore();
            }
            getHitbox() {
                // Hitbox ligeiramente menor que o visual para ser justo
                return {
                    x: this.x - this.width * 0.4,
                    y: this.y - this.height * 0.4,
                    width: this.width * 0.8,
                    height: this.height * 0.8
                };
            }
        }

        // 3. OBSTÁCULOS (Redes, Anzóis e Tubarões)
        class Obstacle {
            constructor(type, x, y, width, height, speed) {
                this.type = type; // 'hook', 'net', 'shark'
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.speed = speed;
                this.passed = false;
                this.markedForDeletion = false;

                // Animação para o tubarão
                this.sharkFrame = 0;
            }
            update(dt) {
                this.x -= this.speed * dt;
                if (this.x + this.width < 0) {
                    this.markedForDeletion = true;
                }
                
                // Tubarão tem leve movimento senoidal
                if (this.type === 'shark') {
                    this.sharkFrame += dt * 5;
                    this.y += Math.sin(this.sharkFrame) * 1.5;
                }
            }
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);

                if (this.type === 'hook') {
                    // Fio
                    ctx.strokeStyle = '#aaaaaa';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(this.width/2, 0);
                    ctx.lineTo(this.width/2, this.height - 30);
                    ctx.stroke();
                    // Anzol
                    ctx.strokeStyle = '#cccccc';
                    ctx.lineWidth = 6;
                    ctx.beginPath();
                    ctx.arc(this.width/2 - 10, this.height - 20, 15, 0, Math.PI);
                    ctx.lineTo(this.width/2 + 5, this.height - 40);
                    ctx.stroke();
                    // Ponta vermelha
                    ctx.fillStyle = '#ff0000';
                    ctx.beginPath();
                    ctx.arc(this.width/2 - 25, this.height - 20, 4, 0, Math.PI*2);
                    ctx.fill();
                } 
                else if (this.type === 'net') {
                    ctx.fillStyle = 'rgba(139, 69, 19, 0.7)'; // Marrom translúcido
                    ctx.fillRect(0, 0, this.width, this.height);
                    // Padrão de rede
                    ctx.strokeStyle = '#4a2511';
                    ctx.lineWidth = 2;
                    for (let i = 0; i < this.width; i += 15) {
                        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, this.height); ctx.stroke();
                    }
                    for (let j = 0; j < this.height; j += 15) {
                        ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(this.width, j); ctx.stroke();
                    }
                    // Borda superior da rede (boias)
                    ctx.fillStyle = '#ff3333';
                    for (let i = 5; i < this.width; i += 20) {
                        ctx.beginPath(); ctx.arc(i, 5, 8, 0, Math.PI*2); ctx.fill();
                    }
                }
                else if (this.type === 'shark') {
                    // Corpo do tubarão
                    ctx.fillStyle = '#556677';
                    ctx.beginPath();
                    ctx.ellipse(this.width/2, this.height/2, this.width/2, this.height/3, 0, 0, Math.PI*2);
                    ctx.fill();
                    // Barbatana dorsal
                    ctx.beginPath();
                    ctx.moveTo(this.width/2, this.height/2 - 10);
                    ctx.lineTo(this.width/2 + 20, -10);
                    ctx.lineTo(this.width/2 + 40, this.height/2);
                    ctx.fill();
                    // Cauda
                    ctx.beginPath();
                    ctx.moveTo(this.width, this.height/2);
                    ctx.lineTo(this.width + 30, 0);
                    ctx.lineTo(this.width + 30, this.height);
                    ctx.fill();
                    // Olho malvado
                    ctx.fillStyle = '#ff0000';
                    ctx.beginPath();
                    ctx.arc(20, this.height/2 - 5, 4, 0, Math.PI*2);
                    ctx.fill();
                    // Dentes brancos
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.moveTo(5, this.height/2 + 5);
                    ctx.lineTo(15, this.height/2 + 15);
                    ctx.lineTo(25, this.height/2 + 5);
                    ctx.fill();
                }

                if (DEBUG) {
                    ctx.strokeStyle = 'red';
                    ctx.lineWidth = 2;
                    // Ajuste visual da hitbox para debug
                    let hw = this.width * 0.8;
                    let hh = this.height * 0.9;
                    let ox = (this.width - hw)/2;
                    let oy = (this.height - hh)/2;
                    ctx.strokeRect(ox, oy, hw, hh);
                }
                ctx.restore();
            }
            getHitbox() {
                // Hitbox mais permissiva (menor que o desenho)
                let hw = this.width * 0.8;
                let hh = this.height * 0.9;
                let ox = (this.width - hw)/2;
                let oy = (this.height - hh)/2;
                return {
                    x: this.x + ox,
                    y: this.y + oy,
                    width: hw,
                    height: hh
                };
            }
        }

        // 4. POWER-UPS
        class PowerUp {
            constructor(type, x, y) {
                this.type = type; // 'shield', 'goldfish'
                this.x = x;
                this.y = y;
                this.radius = 20;
                this.speed = 250; // Move um pouco mais rápido que os canos
                this.markedForDeletion = false;
                this.floatOffset = Math.random() * Math.PI * 2;
            }
            update(dt) {
                this.x -= this.speed * dt;
                this.floatOffset += dt * 3;
                this.y += Math.sin(this.floatOffset) * 1.5;

                if (this.x + this.radius < 0) this.markedForDeletion = true;
            }
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);

                if (this.type === 'shield') {
                    // Bolha brilhante
                    let grad = ctx.createRadialGradient(0, 0, 0, 0, 0, this.radius);
                    grad.addColorStop(0, 'rgba(0, 255, 255, 0.8)');
                    grad.addColorStop(1, 'rgba(0, 100, 255, 0.2)');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.strokeStyle = '#00ffff';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    // Brilho
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(-8, -8, 4, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.type === 'goldfish') {
                    // Peixinho dourado
                    ctx.fillStyle = '#ffd700';
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.radius, this.radius/1.5, 0, 0, Math.PI*2);
                    ctx.fill();
                    // Rabo
                    ctx.beginPath();
                    ctx.moveTo(this.radius-5, 0);
                    ctx.lineTo(this.radius+10, -10);
                    ctx.lineTo(this.radius+10, 10);
                    ctx.fill();
                    // Olho
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(-5, -3, 2, 0, Math.PI*2);
                    ctx.fill();
                }

                if (DEBUG) {
                    ctx.strokeStyle = 'red';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(-this.radius, -this.radius, this.radius*2, this.radius*2);
                }

                ctx.restore();
            }
            getHitbox() {
                return {
                    x: this.x - this.radius,
                    y: this.y - this.radius,
                    width: this.radius * 2,
                    height: this.radius * 2
                };
            }
        }

        // 5. SISTEMA DE PARTÍCULAS
        class Particle {
            constructor(x, y, color, speedScale) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 200 * speedScale;
                this.vy = (Math.random() - 0.5) * 200 * speedScale;
                this.life = 1.0;
                this.decay = Math.random() * 1.5 + 0.5;
                this.color = color;
                this.radius = Math.random() * 5 + 2;
            }
            update(dt) {
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.life -= this.decay * dt;
            }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        /**
         * ============================================================================
         * GERENCIADORES E LÓGICA DE INSTÂNCIA
         * ============================================================================
         */
        
        let bg, player, obstacles, powerups, particles;
        let spawnTimer = 0;
        let sharkTimer = 0;
        let powerupTimer = 0;
        let baseSpeed = 200;

        function initGame() {
            bg = new Background();
            player = new Player();
            obstacles = [];
            powerups = [];
            particles = [];
            spawnTimer = 0;
            sharkTimer = 10; // Tubarão demora um pouco para aparecer a primeira vez
            powerupTimer = 5;
            score = 0;
            baseSpeed = 200;
            scoreDisplay.innerText = `Pontos: 0`;
            doubleScoreDisplay.classList.add('hidden');
        }

        function spawnObstacles() {
            // Gap vertical seguro
            const gap = 180; 
            const minHeight = 50;
            const maxPos = canvas.height - gap - minHeight - 50; // -50 do chão
            
            // Altura do anzol (topo)
            let topHeight = Math.floor(Math.random() * (maxPos - minHeight + 1) + minHeight);
            
            // Altura da rede (baixo)
            let bottomY = topHeight + gap;
            let bottomHeight = canvas.height - bottomY - 50; 

            let spawnX = canvas.width + 100; // Totalmente fora da tela

            obstacles.push(new Obstacle('hook', spawnX, 0, 60, topHeight, baseSpeed));
            obstacles.push(new Obstacle('net', spawnX - 20, bottomY, 100, bottomHeight, baseSpeed));
        }

        function spawnShark() {
            let spawnX = canvas.width + 200;
            let spawnY = Math.random() * (canvas.height - 200) + 50;
            let sharkSpeed = baseSpeed * 1.8; // Tubarão é mais rápido
            obstacles.push(new Obstacle('shark', spawnX, spawnY, 120, 60, sharkSpeed));
        }

        function spawnPowerUp() {
            let spawnX = canvas.width + 150;
            let spawnY = Math.random() * (canvas.height - 200) + 100;
            let type = Math.random() > 0.5 ? 'shield' : 'goldfish';
            powerups.push(new PowerUp(type, spawnX, spawnY));
        }

        function spawnParticles(x, y, count, color, speedScale=1) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color, speedScale));
            }
        }

        // Colisão AABB simples
        function checkCollision(rect1, rect2) {
            return (
                rect1.x < rect2.x + rect2.width &&
                rect1.x + rect1.width > rect2.x &&
                rect1.y < rect2.y + rect2.height &&
                rect1.y + rect1.height > rect2.y
            );
        }

        function triggerGameOver() {
            gameState = 'gameover';
            screenShakeTime = 0.3;
            spawnParticles(player.x, player.y, 30, '#ff0000', 3);
            finalScoreDisplay.innerText = `Pontuação Final: ${score}`;
            hud.classList.add('hidden');
            gameOverScreen.classList.remove('hidden');
        }

        /**
         * ============================================================================
         * CICLO PRINCIPAL (UPDATE & DRAW)
         * ============================================================================
         */

        function update(dt) {
            if (gameState !== 'playing') return;

            // Aumenta a dificuldade sutilmente
            baseSpeed += dt * 2; 

            bg.update(dt);
            player.update(dt);

            // Gerenciamento de Timers de Spawn
            spawnTimer -= dt;
            if (spawnTimer <= 0) {
                spawnObstacles();
                spawnTimer = 2.0 - Math.min((baseSpeed - 200) / 500, 1.0); // Spawns mais rápidos conforme avança
            }

            sharkTimer -= dt;
            if (sharkTimer <= 0) {
                spawnShark();
                sharkTimer = Math.random() * 10 + 10; // A cada 10 a 20 segundos
            }

            powerupTimer -= dt;
            if (powerupTimer <= 0) {
                spawnPowerUp();
                powerupTimer = Math.random() * 10 + 10;
            }

            // Update e Colisão: Obstáculos
            let playerBox = player.getHitbox();
            
            obstacles.forEach(obs => {
                obs.update(dt);

                // Pontuação (apenas para ganchos/redes que passam do jogador)
                if ((obs.type === 'hook' || obs.type === 'net') && !obs.passed && obs.x + obs.width < player.x) {
                    obs.passed = true;
                    // Como spawnamos em pares, só computamos ponto 1 vez por "gap"
                    if (obs.type === 'hook') { 
                        let pointsToAdd = player.doubleScoreTimer > 0 ? 2 : 1;
                        score += pointsToAdd;
                        scoreDisplay.innerText = `Pontos: ${score}`;
                        // Efeito visual de ponto
                        scoreDisplay.style.transform = 'scale(1.5)';
                        setTimeout(() => scoreDisplay.style.transform = 'scale(1)', 150);
                    }
                }

                // Colisão
                if (checkCollision(playerBox, obs.getHitbox())) {
                    if (player.hasBubbleShield) {
                        // Destrói o obstáculo usando o escudo
                        player.hasBubbleShield = false;
                        obs.markedForDeletion = true;
                        screenShakeTime = 0.2;
                        spawnParticles(obs.x, obs.y, 20, '#00ffff', 2);
                    } else {
                        triggerGameOver();
                    }
                }
            });

            // Update e Colisão: PowerUps
            powerups.forEach(pu => {
                pu.update(dt);
                if (checkCollision(playerBox, pu.getHitbox())) {
                    pu.markedForDeletion = true;
                    if (pu.type === 'shield') {
                        player.hasBubbleShield = true;
                        spawnParticles(player.x, player.y, 15, '#00ffff', 2);
                    } else if (pu.type === 'goldfish') {
                        player.doubleScoreTimer = 10;
                        spawnParticles(player.x, player.y, 15, '#ffd700', 2);
                    }
                }
            });

            // Update Partículas
            particles.forEach(p => p.update(dt));

            // Limpeza de arrays
            obstacles = obstacles.filter(obs => !obs.markedForDeletion);
            powerups = powerups.filter(pu => !pu.markedForDeletion);
            particles = particles.filter(p => p.life > 0);

            if (screenShakeTime > 0) {
                screenShakeTime -= dt;
            }
        }

        function draw(ctx) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Aplica Screen Shake global
            ctx.save();
            if (screenShakeTime > 0) {
                let dx = (Math.random() - 0.5) * 15;
                let dy = (Math.random() - 0.5) * 15;
                ctx.translate(dx, dy);
            }

            // Renderiza Fundo (Parallax)
            bg.draw(ctx);

            // Renderiza Entidades
            if (gameState === 'playing' || gameState === 'gameover') {
                obstacles.forEach(obs => obs.draw(ctx));
                powerups.forEach(pu => pu.draw(ctx));
                
                // Esconde o jogador se morreu
                if (gameState === 'playing') {
                    player.draw(ctx);
                }

                particles.forEach(p => p.draw(ctx));
            }

            ctx.restore(); // Restaura contexto após screen shake
        }

        /**
         * ============================================================================
         * MOTOR / ENGINE LOOP (STRICT DELTA TIME)
         * ============================================================================
         */
        function gameLoop(timestamp) {
            // Inicializa tempo
            if (!lastTime) lastTime = timestamp;
            
            // Calcula strict delta time
            let dt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;

            // Cap de segurança (evita saltos massivos ao mudar de aba)
            if (dt > 0.1) dt = 0.1;

            update(dt);
            draw(ctx);

            animationId = requestAnimationFrame(gameLoop);
        }

        /**
         * ============================================================================
         * CONTROLE DE FLUXO DO JOGO
         * ============================================================================
         */
        function startGame() {
            initGame();
            gameState = 'playing';
            
            // UI Estrita - Oculta menus
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            hud.classList.remove('hidden');
            
            // Pulinho inicial para não cair morto instantaneamente
            player.flap();
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);

        // Inicializa o visual do menu principal (renderiza o fundo estático inicial)
        initGame();
        draw(ctx);

        // Inicia o Loop Unificado
        animationId = requestAnimationFrame(gameLoop);

    </script>
</body>
