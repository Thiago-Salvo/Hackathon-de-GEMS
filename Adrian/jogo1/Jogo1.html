<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Space: Orbes do Infinito</title>
    <style>
        /* Estilos e Interface do Jogo */
        body {
            margin: 0;
            padding: 0;
            background-color: #050510;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            color: #fff;
        }

        #container-jogo {
            position: relative;
            width: 400px;
            height: 600px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
            border: 2px solid #1a1a3a;
            border-radius: 10px;
            overflow: hidden;
            background: linear-gradient(to bottom, #020208 0%, #0a0a2a 100%);
        }

        canvas {
            display: block;
        }

        /* Telas de Interface (Start, Game Over) */
        .tela-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 10, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
            backdrop-filter: blur(3px);
        }

        .escondido {
            display: none !important;
        }

        h1 {
            color: #00ffff;
            text-shadow: 0 0 15px #00ffff;
            margin-bottom: 10px;
            font-size: 32px;
        }

        p {
            color: #aaa;
            font-size: 14px;
            line-height: 1.5;
            max-width: 80%;
        }

        button {
            margin-top: 30px;
            padding: 12px 30px;
            font-size: 20px;
            font-family: inherit;
            font-weight: bold;
            color: #000;
            background-color: #00ffff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: #fff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.8);
            transform: scale(1.05);
        }

        /* Interface em Jogo (HUD) */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            z-index: 5;
            pointer-events: none;
        }

        #placar {
            font-size: 36px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 0 #000, 0 0 10px #00ffff;
            text-align: center;
            margin-bottom: 10px;
        }

        #container-barra {
            width: 100%;
            height: 12px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 0, 0.5);
            overflow: hidden;
            display: none;
        }

        #barra-invencibilidade {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ffcc00, #ffffff);
            box-shadow: 0 0 10px #ffcc00;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>

    <div id="container-jogo">
        <canvas id="canvasJogo" width="400" height="600"></canvas>
        
        <div id="hud">
            <div id="placar">0</div>
            <div id="container-barra">
                <div id="barra-invencibilidade"></div>
            </div>
        </div>

        <div id="tela-inicio" class="tela-overlay">
            <h1>FLAPPY SPACE</h1>
            <p>Pilote sua nave através dos detritos espaciais.</p>
            <p style="color: #ffcc00;">Colete orbes dourados para ficar invencível e atravessar obstáculos!</p>
            <p>Controles: Barra de Espaço ou Clique para voar.</p>
            <button id="btn-iniciar">INICIAR MISSÃO</button>
        </div>

        <div id="tela-fim" class="tela-overlay escondido">
            <h1 style="color: #ff3333; text-shadow: 0 0 15px #ff3333;">Nave Destruída</h1>
            <p>Sua pontuação final:</p>
            <h2 id="placar-final" style="font-size: 48px; margin: 10px 0;">0</h2>
            <button id="btn-reiniciar">TENTAR NOVAMENTE</button>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÕES INICIAIS E VARIÁVEIS GERAIS ---
        const canvas = document.getElementById('canvasJogo');
        const ctx = canvas.getContext('2d');

        // Elementos da Interface
        const telaInicio = document.getElementById('tela-inicio');
        const telaFim = document.getElementById('tela-fim');
        const btnIniciar = document.getElementById('btn-iniciar');
        const btnReiniciar = document.getElementById('btn-reiniciar');
        const elPlacar = document.getElementById('placar');
        const elPlacarFinal = document.getElementById('placar-final');
        const containerBarra = document.getElementById('container-barra');
        const barraInvencibilidade = document.getElementById('barra-invencibilidade');

        // Estado do Jogo
        let jogoRodando = false;
        let pontuacao = 0;
        let frames = 0;
        let velocidadeCenario = 2.5;

        // Entidades
        let nave = {};
        let obstaculos = [];
        let orbes = [];
        let estrelas = [];

        // --- SISTEMA DE ÁUDIO (Web Audio API) ---
        let contextoAudio;

        function iniciarAudio() {
            if (!contextoAudio) {
                contextoAudio = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (contextoAudio.state === 'suspended') {
                contextoAudio.resume();
            }
        }

        function tocarSom(tipo) {
            if (!contextoAudio) return;
            
            const osc = contextoAudio.createOscillator();
            const gainNode = contextoAudio.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(contextoAudio.destination);
            
            const agora = contextoAudio.currentTime;

            if (tipo === 'pulo') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, agora);
                osc.frequency.exponentialRampToValueAtTime(600, agora + 0.1);
                gainNode.gain.setValueAtTime(0.1, agora);
                gainNode.gain.exponentialRampToValueAtTime(0.01, agora + 0.1);
                osc.start(agora);
                osc.stop(agora + 0.1);
            } else if (tipo === 'colisao') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, agora);
                osc.frequency.exponentialRampToValueAtTime(10, agora + 0.3);
                gainNode.gain.setValueAtTime(0.2, agora);
                gainNode.gain.exponentialRampToValueAtTime(0.01, agora + 0.3);
                osc.start(agora);
                osc.stop(agora + 0.3);
            } else if (tipo === 'orbe') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, agora);
                osc.frequency.setValueAtTime(600, agora + 0.1);
                osc.frequency.setValueAtTime(800, agora + 0.2);
                gainNode.gain.setValueAtTime(0.1, agora);
                gainNode.gain.exponentialRampToValueAtTime(0.01, agora + 0.3);
                osc.start(agora);
                osc.stop(agora + 0.3);
            }
        }

        // --- INICIALIZAÇÃO E CONTROLE DOS OBJETOS ---

        function criarCenario() {
            estrelas = [];
            for (let i = 0; i < 100; i++) {
                estrelas.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    raio: Math.random() * 1.5,
                    velocidade: Math.random() * 0.5 + 0.1
                });
            }
        }

        function resetarJogo() {
            nave = {
                x: 80,
                y: canvas.height / 2,
                largura: 30,
                altura: 20,
                gravidade: 0.25,
                velocidadeY: 0,
                forcaPulo: -5.5,
                invencivel: false,
                tempoInvencivelMax: 300, // Aprox. 5 segundos a 60fps
                tempoInvencivelAtual: 0,
                angulo: 0
            };
            
            obstaculos = [];
            orbes = [];
            pontuacao = 0;
            frames = 0;
            velocidadeCenario = 2.5;
            
            elPlacar.innerText = pontuacao;
            containerBarra.style.display = 'none';
        }

        function pular() {
            if (!jogoRodando) return;
            nave.velocidadeY = nave.forcaPulo;
            tocarSom('pulo');
        }

        // --- ATUALIZAÇÃO DA LÓGICA (UPDATE) ---

        function gerenciarObstaculos() {
            // Criar novos obstáculos a cada 100 frames
            if (frames % 100 === 0) {
                let espacamentoY = 140; // Espaço para a nave passar
                if(pontuacao > 10) espacamentoY = 120; // Aumenta dificuldade
                if(pontuacao > 20) espacamentoY = 100;
                
                let minAltura = 50;
                let maxAltura = canvas.height - minAltura - espacamentoY;
                let alturaTopo = Math.floor(Math.random() * (maxAltura - minAltura + 1) + minAltura);

                obstaculos.push({
                    x: canvas.width,
                    largura: 50,
                    alturaTopo: alturaTopo,
                    espacamento: espacamentoY,
                    passou: false
                });

                // Chance de gerar um orbe de invencibilidade (15% de chance)
                if (Math.random() < 0.15) {
                    orbes.push({
                        x: canvas.width + 25, // Centralizado no pilar
                        y: alturaTopo + (espacamentoY / 2), // No meio do espaço
                        raio: 12,
                        coletado: false
                    });
                }
            }

            // Atualizar posição e remover obstáculos antigos
            for (let i = 0; i < obstaculos.length; i++) {
                let obs = obstaculos[i];
                obs.x -= velocidadeCenario;

                // Contar pontuação
                if (obs.x + obs.largura < nave.x && !obs.passou) {
                    pontuacao++;
                    elPlacar.innerText = pontuacao;
                    obs.passou = true;
                    // Aumenta a velocidade ligeiramente com o tempo
                    if(pontuacao % 5 === 0) velocidadeCenario += 0.2; 
                }

                // Colisão com os obstáculos (ignora se invencível)
                if (!nave.invencivel) {
                    let bateuNoTopo = nave.y - nave.altura/2 < obs.alturaTopo;
                    let bateuNaBase = nave.y + nave.altura/2 > obs.alturaTopo + obs.espacamento;
                    let dentroDoEixoX = nave.x + nave.largura/2 > obs.x && nave.x - nave.largura/2 < obs.x + obs.largura;

                    if (dentroDoEixoX && (bateuNoTopo || bateuNaBase)) {
                        gameOver();
                    }
                }

                // Remover da memória
                if (obs.x + obs.largura < 0) {
                    obstaculos.splice(i, 1);
                    i--;
                }
            }
        }

        function gerenciarOrbes() {
            for (let i = 0; i < orbes.length; i++) {
                let orbe = orbes[i];
                orbe.x -= velocidadeCenario;

                // Verificar colisão nave -> orbe (distância entre dois pontos)
                let dx = nave.x - orbe.x;
                let dy = nave.y - orbe.y;
                let distancia = Math.sqrt(dx * dx + dy * dy);

                if (distancia < (nave.largura/2 + orbe.raio) && !orbe.coletado) {
                    orbe.coletado = true;
                    ativarInvencibilidade();
                    tocarSom('orbe');
                }

                // Remover se saiu da tela ou foi coletado
                if (orbe.x + orbe.raio < 0 || orbe.coletado) {
                    orbes.splice(i, 1);
                    i--;
                }
            }
        }

        function ativarInvencibilidade() {
            nave.invencivel = true;
            nave.tempoInvencivelAtual = nave.tempoInvencivelMax;
            containerBarra.style.display = 'block';
        }

        function atualizarNave() {
            nave.velocidadeY += nave.gravidade;
            nave.y += nave.velocidadeY;

            // Inclinação da nave baseada na velocidade
            nave.angulo = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, (nave.velocidadeY * 0.1)));

            // Gerenciar tempo de invencibilidade
            if (nave.invencivel) {
                nave.tempoInvencivelAtual--;
                
                // Atualiza UI da barra
                let porcentagem = (nave.tempoInvencivelAtual / nave.tempoInvencivelMax) * 100;
                barraInvencibilidade.style.width = porcentagem + '%';

                // Fim da invencibilidade
                if (nave.tempoInvencivelAtual <= 0) {
                    nave.invencivel = false;
                    containerBarra.style.display = 'none';
                }
            }

            // Colisão com teto e chão
            if (nave.y + nave.altura/2 >= canvas.height || nave.y - nave.altura/2 <= 0) {
                gameOver();
            }
        }

        function atualizarFundo() {
            estrelas.forEach(estrela => {
                estrela.x -= estrela.velocidade + (velocidadeCenario * 0.1);
                if (estrela.x < 0) {
                    estrela.x = canvas.width;
                    estrela.y = Math.random() * canvas.height;
                }
            });
        }

        // --- RENDERIZAÇÃO (DRAW) ---

        function desenharFundo() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffffff';
            estrelas.forEach(estrela => {
                ctx.beginPath();
                ctx.arc(estrela.x, estrela.y, estrela.raio, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function desenharNave() {
            ctx.save();
            ctx.translate(nave.x, nave.y);
            ctx.rotate(nave.angulo);

            // Escudo de Invencibilidade
            if (nave.invencivel) {
                ctx.beginPath();
                ctx.arc(0, 0, nave.largura, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 204, 0, 0.3)';
                ctx.fill();
                ctx.strokeStyle = '#ffcc00';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            // Corpo da nave (triângulo estilizado)
            ctx.beginPath();
            ctx.moveTo(nave.largura / 2, 0); // Bico
            ctx.lineTo(-nave.largura / 2, -nave.altura / 2); // Asa cima
            ctx.lineTo(-nave.largura / 4, 0); // Traseira meio
            ctx.lineTo(-nave.largura / 2, nave.altura / 2); // Asa baixo
            ctx.closePath();
            
            // Cor da nave (Ciano padrão, pisca branco se invencivel e acabando)
            ctx.fillStyle = (nave.invencivel && nave.tempoInvencivelAtual < 60 && frames % 10 < 5) ? '#ffffff' : '#00ffff';
            ctx.fill();
            
            ctx.strokeStyle = '#0088ff';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Fogo do propulsor
            if (nave.velocidadeY < 0) {
                ctx.beginPath();
                ctx.moveTo(-nave.largura / 4, 0);
                ctx.lineTo(-nave.largura, 0 + (Math.random() * 4 - 2));
                ctx.strokeStyle = '#ff5500';
                ctx.lineWidth = 3;
                ctx.stroke();
            }

            ctx.restore();
        }

        function desenharObstaculos() {
            obstaculos.forEach(obs => {
                // Desenhar pilar superior
                let gradiente = ctx.createLinearGradient(obs.x, 0, obs.x + obs.largura, 0);
                gradiente.addColorStop(0, '#1a1a3a');
                gradiente.addColorStop(0.5, '#4a4a8a');
                gradiente.addColorStop(1, '#1a1a3a');

                ctx.fillStyle = gradiente;
                
                // Topo
                ctx.fillRect(obs.x, 0, obs.largura, obs.alturaTopo);
                // Base
                ctx.fillRect(obs.x, obs.alturaTopo + obs.espacamento, obs.largura, canvas.height - (obs.alturaTopo + obs.espacamento));
                
                // Detalhes em neon
                ctx.fillStyle = nave.invencivel ? '#555555' : '#ff0055'; // Ficam cinzas se o jogador estiver invencível (indicando que são inofensivos)
                ctx.fillRect(obs.x - 2, obs.alturaTopo - 5, obs.largura + 4, 5); // Borda do topo
                ctx.fillRect(obs.x - 2, obs.alturaTopo + obs.espacamento, obs.largura + 4, 5); // Borda da base
            });
        }

        function desenharOrbes() {
            orbes.forEach(orbe => {
                ctx.beginPath();
                ctx.arc(orbe.x, orbe.y, orbe.raio + Math.sin(frames * 0.1) * 3, 0, Math.PI * 2); // Efeito pulsante
                ctx.fillStyle = '#ffcc00';
                ctx.fill();
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ffcc00';
                ctx.fill();
                ctx.shadowBlur = 0; // Resetar sombra
                
                // Brilho central
                ctx.beginPath();
                ctx.arc(orbe.x, orbe.y, orbe.raio / 2, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
            });
        }

        // --- FLUXO PRINCIPAL (GAME LOOP) ---

        function loop() {
            if (!jogoRodando) return;

            atualizarFundo();
            atualizarNave();
            gerenciarObstaculos();
            gerenciarOrbes();

            desenharFundo();
            desenharObstaculos();
            desenharOrbes();
            desenharNave();

            frames++;
            requestAnimationFrame(loop);
        }

        function iniciarPartida() {
            iniciarAudio();
            telaInicio.classList.add('escondido');
            telaFim.classList.add('escondido');
            criarCenario();
            resetarJogo();
            jogoRodando = true;
            loop();
        }

        function gameOver() {
            jogoRodando = false;
            tocarSom('colisao');
            
            // Efeito de flash na tela
            ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            setTimeout(() => {
                elPlacarFinal.innerText = pontuacao;
                telaFim.classList.remove('escondido');
                containerBarra.style.display = 'none';
            }, 500);
        }

        // --- EVENTOS DE CONTROLE ---

        // Previne scroll ao usar a barra de espaço
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (jogoRodando) {
                    pular();
                } else if (!telaInicio.classList.contains('escondido') || !telaFim.classList.contains('escondido')) {
                    // Se não estiver rodando e as telas de menu/fim estiverem ativas, inicie
                    iniciarPartida();
                }
            }
        });

        // Controle por clique no canvas
        canvas.addEventListener('mousedown', pular);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Evita duplicação de eventos em touch
            pular();
        }, {passive: false});

        // Botões das interfaces
        btnIniciar.addEventListener('click', iniciarPartida);
        btnReiniciar.addEventListener('click', iniciarPartida);

        // Renderização inicial estática (para não ficar tela preta)
        criarCenario();
        desenharFundo();

    </script>
</body>
</html>
